<div id="ChatBridgeExtension_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Chat Bridge</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="ChatBridgeExtension_connection">
                <div class="ChatBridgeExtension_server_settings">
                    <div class="ChatBridgeExtension_url_input">
                        <label>服务器地址 (含协议头):</label>
                        <input type="text" id="cb_url" placeholder="http://localhost:8003 或 https://xxx.zeabur.app" style="width: 100%;" />
                    </div>
                    <div class="ChatBridgeExtension_token_input">
                        <label>Token:</label>
                        <input type="password" id="cb_token" placeholder="可选，留空禁用" />
                    </div>
                </div>
                <div class="ChatBridgeExtension_controls">
                    <input type="button" id="cb_connect" value="开始轮询" />
                    <input type="button" id="cb_disconnect" value="停止" disabled />
                    <label>
                        <input type="checkbox" id="cb_auto_connect"/>
                        启动时自动开始
                    </label>
                </div>
            </div>
            <div class="ChatBridgeExtension_status">
                <label>服务器状态:</label>
                <div id="cb_status" style="color: red;">未连接</div>
            </div>
            <div class="ChatBridgeExtension_debug">
                <label>调试信息:</label>
                <textarea id="debug_log" rows="40" style="width: 100%; background-color: var(--background-color); color: var(--text-color); border: 1px solid var(--accent-color);" readonly></textarea>
            </div>
        </div>
    </div>
</div>
