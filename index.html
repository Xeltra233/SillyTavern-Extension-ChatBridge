<div id="ChatBridgeExtension_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Chat Bridge</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <!-- WebSocket 连接 -->
            <div class="ChatBridgeExtension_connection">
                <div class="ChatBridgeExtension_server_settings">
                    <div class="ChatBridgeExtension_url_input">
                        <label>服务器地址:</label>
                        <input type="text" id="ws_url" value="localhost" />
                    </div>
                    <div class="ChatBridgeExtension_port_input">
                        <label>端口:</label>
                        <input type="number" id="ws_port" value="8001" />
                    </div>
                    <div class="ChatBridgeExtension_token_input">
                        <label>Token:</label>
                        <input type="password" id="ws_token" placeholder="可选，留空禁用" />
                    </div>
                </div>
                <div class="ChatBridgeExtension_controls">
                    <input type="button" id="ws_connect" value="连接" />
                    <input type="button" id="ws_disconnect" value="断开" disabled />
                    <label>
                        <input type="checkbox" id="ws_auto_connect"/>
                        每5s自动尝试连接
                    </label>
                </div>
            </div>

            <!-- 连接状态 -->
            <div class="ChatBridgeExtension_status">
                <label>服务器状态:</label>
                <div id="ws_status" style="color: red;">未连接</div>
            </div>

            <!-- 后端配置（通过 ST Server Plugin 读写 settings.json） -->
            <div class="inline-drawer" style="margin-top: 10px;">
                <div class="inline-drawer-toggle inline-drawer-header">
                    <b>后端配置</b>
                    <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
                </div>
                <div class="inline-drawer-content">
                    <div style="margin: 6px 0;">
                        <label>User API Key（QQ机器人鉴权，留空不鉴权）:</label>
                        <input type="password" id="cb_user_api_key" style="width:100%;" />
                    </div>
                    <div style="margin: 6px 0;">
                        <label>User API 端口:</label>
                        <input type="number" id="cb_user_api_port" value="8003" style="width:100%;" />
                    </div>
                    <div style="margin: 6px 0;">
                        <label>WebSocket 端口:</label>
                        <input type="number" id="cb_ws_port" value="8001" style="width:100%;" />
                    </div>
                    <div style="margin: 6px 0; display: flex; gap: 8px; align-items: center;">
                        <input type="button" id="cb_save_settings" value="保存并重启后端" />
                        <span id="cb_save_status" style="font-size: 0.85em; color: gray;"></span>
                    </div>
                    <div style="margin: 6px 0;">
                        <label>后端进程: <span id="cb_py_status" style="color: gray;">检测中...</span></label>
                    </div>
                </div>
            </div>

            <!-- 调试日志 -->
            <div class="ChatBridgeExtension_debug">
                <label>调试信息:</label>
                <textarea id="debug_log" rows="40" style="width: 100%; background-color: var(--background-color); color: var(--text-color); border: 1px solid var(--accent-color);" readonly></textarea>
            </div>

        </div>
    </div>
</div>
